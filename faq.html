<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>FAQ</title>

  <!-- GitHub と同じ Markdown スタイル -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">

  <style>
    body {
      display: flex;
      justify-content: center;
      padding: 40px;
      background: #f6f8fa;
    }
    .markdown-body {
      max-width: 900px;
      padding: 20px;
      background: white;
    }
  </style>
</head>

<body>
  <article class="markdown-body">
    {{ site.pages | where: "name", "faq.md" | first | content | markdownify }}
  </article>
</body>
</html>
