---
layout: none
---
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>FAQ</title>

  <!-- GitHub と同じ Markdown スタイル -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">

  <!-- サイト共通のデザイン（style.css）を読み込む -->
  <link rel="stylesheet" href="style.css">

  <style>
  /* body のレイアウト調整
     - display:flex を使うとページが横に広がるため削除
     - 背景色と外側の余白だけ設定 */
  body {
    padding: 40px;
    background: #f6f8fa;
  }

  /* コンテンツ領域
     - 最大幅を制限して読みやすく
     - margin: 0 auto で中央寄せ */
  .markdown-body {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    background: white;
  }
</style>

</head>

<body>
  <article class="markdown-body">
    {{ site.static_files | where: "name", "faq.md" | first | content | markdownify }}
  </article>
</body>
</html>
